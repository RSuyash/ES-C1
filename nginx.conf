server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self' https://www.facebook.com; object-src 'none'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://connect.facebook.net https://www.clarity.ms; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://region1.google-analytics.com https://region1.analytics.google.com https://www.google.com https://www.google.co.in https://www.googleadservices.com https://googleads.g.doubleclick.net https://stats.g.doubleclick.net https://www.facebook.com https://connect.facebook.net https://www.clarity.ms https://*.clarity.ms https://c.bing.com; font-src 'self' data: https:; frame-src 'self' https://www.googletagmanager.com https://www.facebook.com; form-action 'self'; upgrade-insecure-requests" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 'ok';
  }

  location /api/ {
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $naya_api_upstream http://naya-api:3001;
    proxy_http_version 1.1;
    proxy_pass $naya_api_upstream;
    proxy_set_header Host $host;
    proxy_set_header Origin "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location = /robots.txt {
    access_log off;
    try_files $uri =404;
  }

  location = /sitemap.xml {
    access_log off;
    try_files $uri =404;
  }

  location ~* \.(?:css|js|mjs|jpg|jpeg|png|gif|ico|webp|svg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
