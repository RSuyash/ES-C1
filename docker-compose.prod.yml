services:
  wagholi-highstreet:
    build:
      context: .
    container_name: wagholi-highstreet
    restart: unless-stopped
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.docker.network: proxy_net
      traefik.http.routers.wagholi-highstreet.entrypoints: websecure
      traefik.http.routers.wagholi-highstreet.rule: Host(`wagholihighstreet.in`) || Host(`www.wagholihighstreet.in`)
      traefik.http.routers.wagholi-highstreet.tls.certresolver: letsencrypt
      traefik.http.services.wagholi-highstreet.loadbalancer.server.port: "80"

networks:
  proxy_net:
    external: true
